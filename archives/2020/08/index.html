<script>
  // 基于LearnCloud的 pv|uv|阅读量
  
    
      AV.init({
        appId: "tq4lHkryFNXHsw9SOypjPRwx-gzGzoHsz",
        appKey: "lFmuObNsezjTPj5e86R1TgOg",
        serverURL: "https://avoscloud.com"
      });
    

    

    Observer.callback = function(){
      var pvElem = document.querySelector("#value_site_pv");
      pvElem.innerText = VISIT_INFO.totalPV;
      pvElem.parentNode.style.display='inline-block';
    }
    VISIT_INFO.totalPV;
    Observer.callback = null;

    Observer.callback = function(){
      var pvElem = document.querySelector("#value_site_uv");
      pvElem.innerText = VISIT_INFO.totalUV;
      pvElem.parentNode.style.display='inline-block';
    }
    VISIT_INFO.totalUV;
    Observer.callback = null;

    // lazyScripts.push({url: '/js/visit_count.min.js', async: false});
    setTimeout(function() {
  var VisitPV = AV.Object.extend("visit_pv");
  var VisitUV = AV.Object.extend("visit_uv");

  // 记录pv
  var queryPV = new AV.Query(VisitPV);
  var pathName = location.pathname;
  
  if(!location.hostname.match('localhost')){
  
    queryPV.equalTo("url", pathName);
    queryPV.find().then(data => {
      if (data.length) {
        var theRecord = data[0];
        VISIT_INFO.curPagePV = theRecord.get("times");
        theRecord.increment("times", 1);
        theRecord.save();
      } else {
        VISIT_INFO.curPagePV = 0;
        var newRecord = new VisitPV();
        newRecord.set("url", pathName);
        newRecord.set("times", 1);
        
        newRecord.save();
      }
    });
  
  }
  

  // 调用云函数获取pv总数
  AV.Cloud.run('total_pv',{remote:true}).then(data=>{
    VISIT_INFO.totalPV = data;
  })

  // 记录uv
  var curUID = localStorage.getItem("blog_UID");
  if (!curUID) {
    curUID = generateUID();
    localStorage.setItem("blog_UID", generateUID());
  }
  var queryUV = new AV.Query(VisitUV);
  
  if(!location.hostname.match('localhost')){
  
    queryUV.equalTo("UID", curUID);
    queryUV.find().then(data => {
      if (data.length) {
        var theRecord = data[0];
        theRecord.increment("times", 1);
        theRecord.save();
      } else {
        var newRecord = new VisitUV();
        newRecord.set("UID", curUID);
        newRecord.set("times", 1);
        newRecord.save();
      }
    });
  
  }
  
  // 查询总访客数
  queryUV = new AV.Query(VisitUV);
  queryUV.count().then(function(totalUV) {
    var baseUV = 1998;// 追加上之前近3年由不蒜子统计的大概数量
    VISIT_INFO.totalUV = totalUV + baseUV;
  });
}, 100);


  
</script>
